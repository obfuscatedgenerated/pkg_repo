name: Generate provided.txt

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js 16
        uses: actions/setup-node@v3
        with:
          node-version: "16.x"
      - name: Run script
        run: node _assets/gen_provided.js
      - name: Commit result
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add provided.txt
          if [[ `git status --porcelain` ]]; then
          git commit -m "update provided list"
          git push
          else
          echo "No changes!"
          fi
